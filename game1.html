<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Ultimate Tic-Tac-Toe</title>
    <style>
        body { background:#141414; color:#f0f0f0; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; }
        canvas { border:4px solid #646464; background:#141414; cursor:pointer; }
        #status { font-size:20px; margin-bottom:15px; font-weight:bold; }
        #hint { margin-top:10px; color:#888; font-size:14px; }
        a { color: #888; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="status">Ход игрока: <span id="p-disp" style="color:#c83232;">X</span></div>
    <canvas id="c" width="600" height="600"></canvas>
    <div id="hint">Пробел (Space) — сброс</div>
    <a href="index.html">← На главную</a>

<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d'), pDisp = document.getElementById('p-disp');
const W = 600, C = 200, S = C / 3;
const COLORS = { X:'#c83232', O:'#3264c8', line:'#646464', sub:'#323232', wl:'#f0f0f0', dwl:'#5c5c5c', dX:'#501f1f', dO:'#1f2d50', bX:'#320f0f', bO:'#0f1932', bgX:'rgba(64,24,24,0.7)', bgO:'rgba(24,32,64,0.7)' };

let board, big_board, mini_lines, global_line, player, active, over;

function reset() {
    board = Array(9).fill(0).map(() => Array(3).fill(0).map(() => Array(3).fill('')));
    big_board = Array(3).fill(0).map(() => Array(3).fill(''));
    mini_lines = {}; global_line = null; player = 'X'; active = -1; over = false;
    upd();
}

function upd() {
    pDisp.textContent = over ? `Победитель ${global_line.w}!` : player;
    pDisp.style.color = (over ? global_line.w : player) === 'X' ? COLORS.X : COLORS.O;
    draw();
}

function check(g) {
    for(let i=0; i<3; i++) {
        if(g[i][0] && g[i][0]===g[i][1] && g[i][0]===g[i][2]) return {w:g[i][0], t:'r', id:i};
        if(g[0][i] && g[0][i]===g[1][i] && g[0][i]===g[2][i]) return {w:g[0][i], t:'c', id:i};
    }
    if(g[0][0] && g[0][0]===g[1][1] && g[0][0]===g[2][2]) return {w:g[0][0], t:'d1', id:0};
    if(g[0][2] && g[0][2]===g[1][1] && g[0][2]===g[2][0]) return {w:g[0][2], t:'d2', id:0};
    return null;
}

function draw() {
    ctx.fillStyle = '#141414'; ctx.fillRect(0, 0, W, W);
    
    // 1. Подсветка ходов и фоны побед
    for(let b=0; b<9; b++) {
        let r = Math.floor(b/3), c = b%3, m = big_board[r][c];
        if(m) {
            ctx.fillStyle = m==='X' ? COLORS.bgX : COLORS.bgO;
            ctx.fillRect(c*C, r*C, C, C);
        } else if(!over && (active===-1 || active===b)) {
            ctx.fillStyle = player==='X' ? COLORS.bX : COLORS.bO;
            ctx.fillRect(c*C, r*C, C, C);
        }
    }

    // 2. Сетки
    for(let r=0; r<3; r++) for(let c=0; c<3; c++) {
        ctx.lineWidth=2; ctx.strokeStyle=COLORS.sub;
        for(let i=1; i<3; i++) {
            ctx.beginPath(); ctx.moveTo(c*C+i*S, r*C); ctx.lineTo(c*C+i*S, r*C+C); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(c*C, r*C+i*S); ctx.lineTo(c*C+C, r*C+i*S); ctx.stroke();
        }
    }
    ctx.lineWidth=6; ctx.strokeStyle=COLORS.line;
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(0, i*C); ctx.lineTo(W, i*C); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(i*C, 0); ctx.lineTo(i*C, W); ctx.stroke();
    }

    // 3. Знаки и мини-линии
    for(let b=0; b<9; b++) {
        let br=Math.floor(b/3), bc=b%3, cap=big_board[br][bc]!=='';
        for(let r=0; r<3; r++) for(let c=0; c<3; c++) {
            let m=board[b][r][c], cx=bc*C+c*S+S/2, cy=br*C+r*S+S/2;
            if(!m) continue;
            ctx.lineWidth=4; ctx.strokeStyle = m==='X' ? (cap?COLORS.dX:COLORS.X) : (cap?COLORS.dO:COLORS.O);
            ctx.beginPath();
            if(m==='X') { ctx.moveTo(cx-12, cy-12); ctx.lineTo(cx+12, cy+12); ctx.moveTo(cx+12, cy-12); ctx.lineTo(cx-12, cy+12); }
            else { ctx.arc(cx, cy, 12, 0, Math.PI*2); }
            ctx.stroke();
        }
        if(mini_lines[b]) {
            let {t, id}=mini_lines[b], sx=bc*C, sy=br*C;
            ctx.lineWidth=3; ctx.strokeStyle=cap?COLORS.dwl:COLORS.wl; ctx.beginPath();
            if(t==='r') ctx.moveTo(sx+10, sy+id*S+S/2), ctx.lineTo(sx+C-10, sy+id*S+S/2);
            if(t==='c') ctx.moveTo(sx+id*S+S/2, sy+10), ctx.lineTo(sx+id*S+S/2, sy+C-10);
            if(t==='d1') ctx.moveTo(sx+10, sy+10), ctx.lineTo(sx+C-10, sy+C-10);
            if(t==='d2') ctx.moveTo(sx+C-10, sy+10), ctx.lineTo(sx+10, sy+C-10);
            ctx.stroke();
        }
    }

    // 4. Большие знаки и финал
    for(let r=0; r<3; r++) for(let c=0; c<3; c++) {
        let m=big_board[r][c], cx=c*C+C/2, cy=r*C+C/2;
        if(!m) continue;
        ctx.lineWidth=12; ctx.strokeStyle=m==='X'?COLORS.X:COLORS.O; ctx.beginPath();
        if(m==='X') { ctx.moveTo(cx-50, cy-50); ctx.lineTo(cx+50, cy+50); ctx.moveTo(cx+50, cy-50); ctx.lineTo(cx-50, cy+50); }
        else { ctx.arc(cx, cy, 55, 0, Math.PI*2); }
        ctx.stroke();
    }

    if(global_line) {
        let {t, id}=global_line; ctx.lineWidth=8; ctx.strokeStyle=COLORS.wl; ctx.beginPath();
        if(t==='r') ctx.moveTo(20, id*C+C/2), ctx.lineTo(W-20, id*C+C/2);
        if(t==='c') ctx.moveTo(id*C+C/2, 20), ctx.lineTo(id*C+C/2, W-20);
        if(t==='d1') ctx.moveTo(20, 20), ctx.lineTo(W-20, W-20);
        if(t==='d2') ctx.moveTo(W-20, 20), ctx.lineTo(20, W-20);
        ctx.stroke();
    }
}

cv.addEventListener('mousedown', (e) => {
    if(over) return;
    const rc = cv.getBoundingClientRect(), bx = Math.floor((e.clientX-rc.left)/C), by = Math.floor((e.clientY-rc.top)/C), b = by*3+bx;
    const sx = Math.floor(((e.clientX-rc.left)%C)/S), sy = Math.floor(((e.clientY-rc.top)%C)/S);

    if((active===-1 || active===b) && big_board[by][bx]==='' && board[b][sy][sx]==='') {
        board[b][sy][sx] = player;
        let wd = check(board[b]);
        if(wd) { big_board[by][bx]=wd.w; mini_lines[b]={t:wd.t, id:wd.id}; }
        
        let n = sy*3+sx;
        active = big_board[Math.floor(n/3)][n%3]!=='' ? -1 : n;
        
        let gw = check(big_board);
        if(gw) { over=true; global_line=gw; } else { player = player==='X'?'O':'X'; }
        upd();
    }
});

window.addEventListener('keydown', (e) => { if(e.code==='Space') reset(); });
reset();
</script>
</body>
</html>
