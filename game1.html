<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const playerDisplay = document.getElementById('player-display');

const WIDTH = 600;
const HEIGHT = 600;
const CELL_SIZE = WIDTH / 3;
const SUB_CELL_SIZE = CELL_SIZE / 3;

const BG_COLOR = '#141414';
const LINE_COLOR = '#646464';
const SUB_LINE_COLOR = '#323232';
const X_COLOR = '#c83232';
const O_COLOR = '#3264c8';
const WIN_LINE_COLOR = '#f0f0f0';
const DIM_WIN_LINE_COLOR = '#5c5c5c';

const DIM_X_COLOR = '#501f1f';
const DIM_O_COLOR = '#1f2d50';
const ACTIVE_X_BG = '#320f0f';
const ACTIVE_O_BG = '#0f1932';
const DIM_X_BG = 'rgba(64, 24, 24, 0.7)';
const DIM_O_BG = 'rgba(24, 32, 64, 0.7)';

let board, big_board, mini_win_lines, global_win_line, current_player, active_board, game_over;

function resetGame() {
    board = Array(9).fill(null).map(() => Array(3).fill(null).map(() => Array(3).fill('')));
    big_board = Array(3).fill(null).map(() => Array(3).fill(''));
    mini_win_lines = {};
    global_win_line = null;
    current_player = 'X';
    active_board = -1;
    game_over = false;
    updateStatus();
}

function updateStatus() {
    if (game_over) {
        playerDisplay.textContent = `Победитель ${global_win_line.winner}!`;
        playerDisplay.style.color = global_win_line.winner === 'X' ? X_COLOR : O_COLOR;
    } else {
        playerDisplay.textContent = current_player;
        playerDisplay.style.color = current_player === 'X' ? X_COLOR : O_COLOR;
    }
}

function checkWin(grid) {
    for (let r = 0; r < 3; r++) {
        if (grid[r][0] === grid[r][1] && grid[r][1] === grid[r][2] && grid[r][0] !== '') {
            return { winner: grid[r][0], type: 'row', idx: r };
        }
    }
    for (let c = 0; c < 3; c++) {
        if (grid[0][c] === grid[1][c] && grid[1][c] === grid[2][c] && grid[0][c] !== '') {
            return { winner: grid[0][c], type: 'col', idx: c };
        }
    }
    if (grid[0][0] === grid[1][1] && grid[1][1] === grid[2][2] && grid[0][0] !== '') {
        return { winner: grid[0][0], type: 'diag1', idx: 0 };
    }
    if (grid[0][2] === grid[1][1] && grid[1][1] === grid[2][0] && grid[0][2] !== '') {
        return { winner: grid[0][2], type: 'diag2', idx: 0 };
    }
    return null;
}

function draw() {
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    const activeBG = current_player === 'X' ? ACTIVE_X_BG : ACTIVE_O_BG;

    if (!game_over) {
        if (active_board !== -1) {
            let r = Math.floor(active_board / 3);
            let c = active_board % 3;
            ctx.fillStyle = activeBG;
            ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        } else {
            for (let b = 0; b < 9; b++) {
                let r = Math.floor(b / 3);
                let c = b % 3;
                if (big_board[r][c] === '') {
                    ctx.fillStyle = activeBG;
                    ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            }
        }
    }

    ctx.lineWidth = 2;
    ctx.strokeStyle = SUB_LINE_COLOR;
    for (let br = 0; br < 3; br++) {
        for (let bc = 0; bc < 3; bc++) {
            let sx = bc * CELL_SIZE;
            let sy = br * CELL_SIZE;
            for (let i = 1; i < 3; i++) {
                ctx.beginPath(); ctx.moveTo(sx + i * SUB_CELL_SIZE, sy); ctx.lineTo(sx + i * SUB_CELL_SIZE, sy + CELL_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(sx, sy + i * SUB_CELL_SIZE); ctx.lineTo(sx + CELL_SIZE, sy + i * SUB_CELL_SIZE); ctx.stroke();
            }
        }
    }

    ctx.lineWidth = 6;
    ctx.strokeStyle = LINE_COLOR;
    for (let i = 1; i < 3; i++) {
        ctx.beginPath(); ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(WIDTH, i * CELL_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, HEIGHT); ctx.stroke();
    }

    for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
            let mark = big_board[r][c];
            if (mark) {
                ctx.fillStyle = mark === 'X' ? DIM_X_BG : DIM_O_BG;
                ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            }
        }
    }

    for (let b = 0; b < 9; b++) {
        let br = Math.floor(b / 3), bc = b % 3;
        let isCaptured = big_board[br][bc] !== '';
        ctx.lineWidth = 4;

        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < 3; c++) {
                let mark = board[b][r][c];
                if (mark) {
                    let cx = bc * CELL_SIZE + c * SUB_CELL_SIZE + SUB_CELL_SIZE / 2;
                    let cy = br * CELL_SIZE + r * SUB_CELL_SIZE + SUB_CELL_SIZE / 2;
                    if (mark === 'X') {
                        ctx.strokeStyle = isCaptured ? DIM_X_COLOR : X_COLOR;
                        ctx.beginPath(); ctx.moveTo(cx - 15, cy - 15); ctx.lineTo(cx + 15, cy + 15); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(cx + 15, cy - 15); ctx.lineTo(cx - 15, cy + 15); ctx.stroke();
                    } else {
                        ctx.strokeStyle = isCaptured ? DIM_O_COLOR : O_COLOR;
                        ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI * 2); ctx.stroke();
                    }
                }
            }
        }
    }

    for (let b_idx in mini_win_lines) {
        let { type, idx } = mini_win_lines[b_idx];
        let br = Math.floor(b_idx / 3), bc = b_idx % 3;
        let sx = bc * CELL_SIZE, sy = br * CELL_SIZE;
        ctx.strokeStyle = big_board[br][bc] !== '' ? DIM_WIN_LINE_COLOR : WIN_LINE_COLOR;
        ctx.lineWidth = 3;

        ctx.beginPath();
        if (type === 'row') {
            let y = sy + idx * SUB_CELL_SIZE + SUB_CELL_SIZE / 2;
            ctx.moveTo(sx + 10, y); ctx.lineTo(sx + CELL_SIZE - 10, y);
        } else if (type === 'col') {
            let x = sx + idx * SUB_CELL_SIZE + SUB_CELL_SIZE / 2;
            ctx.moveTo(x, sy + 10); ctx.lineTo(x, sy + CELL_SIZE - 10);
        } else if (type === 'diag1') {
            ctx.moveTo(sx + 10, sy + 10); ctx.lineTo(sx + CELL_SIZE - 10, sy + CELL_SIZE - 10);
        } else if (type === 'diag2') {
            ctx.moveTo(sx + CELL_SIZE - 10, sy + 10); ctx.lineTo(sx + 10, sy + CELL_SIZE - 10);
        }
        ctx.stroke();
    }

    for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
            let mark = big_board[r][c];
            if (mark) {
                let cx = c * CELL_SIZE + CELL_SIZE / 2;
                let cy = r * CELL_SIZE + CELL_SIZE / 2;
                ctx.lineWidth = 12;
                if (mark === 'X') {
                    ctx.strokeStyle = X_COLOR;
                    ctx.beginPath(); ctx.moveTo(cx - 60, cy - 60); ctx.lineTo(cx + 60, cy + 60); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx + 60, cy - 60); ctx.lineTo(cx - 60, cy + 60); ctx.stroke();
                } else {
                    ctx.strokeStyle = O_COLOR;
                    ctx.beginPath(); ctx.arc(cx, cy, 65, 0, Math.PI * 2); ctx.stroke();
                }
            }
        }
    }

    if (global_win_line) {
        let { type, idx } = global_win_line;
        ctx.strokeStyle = WIN_LINE_COLOR;
        ctx.lineWidth = 8;
        ctx.beginPath();
        if (type === 'row') { let y = idx * CELL_SIZE + CELL_SIZE / 2; ctx.moveTo(20, y); ctx.lineTo(WIDTH - 20, y); }
        else if (type === 'col') { let x = idx * CELL_SIZE + CELL_SIZE / 2; ctx.moveTo(x, 20); ctx.lineTo(x, HEIGHT - 20); }
        else if (type === 'diag1') { ctx.moveTo(20, 20); ctx.lineTo(WIDTH - 20, HEIGHT - 20); }
        else if (type === 'diag2') { ctx.moveTo(WIDTH - 20, 20); ctx.lineTo(20, HEIGHT - 20); }
        ctx.stroke();
    }
}

canvas.addEventListener('mousedown', (e) => {
    if (game_over) return;
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const b_col = Math.floor(mouseX / CELL_SIZE);
    const b_row = Math.floor(mouseY / CELL_SIZE);
    const b_idx = b_row * 3 + b_col;

    const sub_col = Math.floor((mouseX % CELL_SIZE) / SUB_CELL_SIZE);
    const sub_row = Math.floor((mouseY % CELL_SIZE) / SUB_CELL_SIZE);

    if (active_board === -1 || active_board === b_idx) {
        if (big_board[b_row][b_col] === '' && board[b_idx][sub_row][sub_col] === '') {
            board[b_idx][sub_row][sub_col] = current_player;

            let winData = check_win(board[b_idx]);
            if (winData) {
                big_board[b_row][b_col] = winData.winner;
                mini_win_lines[b_idx] = { type: winData.type, idx: winData.idx };
            }

            let next_board_idx = sub_row * 3 + sub_col;
            if (big_board[Math.floor(next_board_idx / 3)][next_board_idx % 3] !== '') {
                active_board = -1;
            } else {
                active_board = next_board_idx;
            }

            let globalWin = check_win(big_board);
            if (globalWin) {
                game_over = true;
                global_win_line = globalWin;
            } else {
                current_player = current_player === 'X' ? 'O' : 'X';
            }
            updateStatus();
            draw();
        }
    }
});

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        resetGame();
        draw();
    }
});

resetGame();
draw();
</script>
